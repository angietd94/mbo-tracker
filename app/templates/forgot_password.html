{% extends "auth_layout.html" %}

{% block content %}
<div class="login-container">
    <div style="text-align: center; margin-bottom: 30px;">
        <img src="{{ url_for('static', filename='img/snaplogic-logo-blue.png') }}" alt="SnapLogic Logo" style="height: 80px; margin-bottom: 20px;">
        <h1 style="color: #0046ad; font-weight: 500; margin-top: 0;">Reset Password</h1>
        <p style="color: #6c757d; font-size: 1.1rem; margin-top: 10px;">Enter your email to receive password reset instructions</p>
    </div>
    
    <div class="alert" style="background-color: #fff3cd; border-left: 4px solid #ffc107; padding: 15px; margin: 20px auto; border-radius: 4px; max-width: 400px;">
        <p style="margin: 0; color: #856404;"><strong>Note:</strong> Email notifications are currently a work in progress. Please contact your manager for password reset assistance.</p>
    </div>
    
    <form method="POST" action="{{ url_for('forgot_password') }}" style="max-width: 400px; margin: 0 auto;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
        <div style="margin-bottom: 20px;">
            <label for="email" style="display: block; margin-bottom: 8px; font-weight: 500; color: #495057;">Email Address</label>
            <input type="email" id="email" name="email" placeholder="your.email@snaplogic.com" required 
                   style="width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 4px; font-size: 16px;">
        </div>
        
        <button type="submit" style="width: 100%; background-color: #0046ad; color: white; border: none; padding: 14px; 
                                    border-radius: 4px; font-size: 16px; font-weight: 500; cursor: pointer; transition: background-color 0.2s;">
            Send Reset Link
        </button>
    </form>
    
    <div style="text-align: center; margin-top: 30px;">
        <a href="{{ url_for('login') }}" style="color: #0046ad; text-decoration: none;">
            Back to Login
        </a>
    </div>
</div>
{% endblock %}
